<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>जय माँ राघवेश्वरी – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LEFT PANEL ── -->
  <div class="left">
    <img class="bg"
      src="login page/maa.jpeg"
      alt="माँ राघवेश्वरी" />
    <div class="badge">जय माँ राघवेश्वरी! ❤️</div>
    <div class="caption">Secure Authentication System</div>
    <div class="divider-line"></div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="right">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="card">
      <div class="om">ॐ</div>
      <h1>Sign In</h1>
      <p class="shloka">या देवी सर्व भूतेषु लक्ष्मी रुपेण संस्थिता।<br/>नमस्तस्ये नमस्तस्ये नमस्तस्ये नमो नमः ॥</p>

      <div class="gold-rule"><span>✦</span></div>

      <!-- EMAIL -->
      <div class="input-wrap">
        <label for="email">Email Address</label>
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <!-- PASSWORD -->
      <div class="input-wrap">
        <label for="password">Password</label>
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-signin" id="signinBtn">Sign In</button>

      <div class="or-sep">or</div>

      <p class="create-account">
        Don't have an account? <a href="#">Create Account</a>
      </p>
    </div>

    <div class="made-with">Made with Emergent ⚡</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
